name: CI

# Lint/type-check, unit tests, and a CDK synth. This pipeline needs NO AWS credentials:
# `cdk synth` only renders CloudFormation locally. Deployment is a separate, gated step
# (see the OIDC note in README.md) and never runs on untrusted input.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PII / secret guard
        run: bash scripts/pii-guard.sh

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --ci

      - name: CDK synth (no AWS credentials required)
        run: npx cdk synth -c senderEmail=ci@example.com
